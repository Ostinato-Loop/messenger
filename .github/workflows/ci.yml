name: CI — Type Check & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-build:
    name: Type Check + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run codegen
        run: pnpm --filter @workspace/api-spec run codegen

      - name: TypeScript type check
        run: pnpm -w run typecheck:libs

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontend (Loop Messenger)
        env:
          BASE_PATH: /
          PORT: 3000
          NODE_ENV: production
        run: pnpm --filter @workspace/loop-messenger run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: loop-messenger-dist
          path: artifacts/loop-messenger/dist/public/
          retention-days: 7
