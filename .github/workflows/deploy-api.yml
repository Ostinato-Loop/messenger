name: Deploy — Cloudflare Worker API Gateway

on:
  push:
    branches: [main]
    paths:
      - 'workers/loop-messenger-api/**'
      - 'artifacts/api-server/**'
      - 'lib/db/**'
      - 'lib/api-spec/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install worker dependencies
        working-directory: workers/loop-messenger-api
        run: npm install

      - name: Deploy worker to Cloudflare
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️  CLOUDFLARE_WORKERS_TOKEN not configured."
            echo "   To enable worker auto-deploy, add a Cloudflare API token with"
            echo "   'Cloudflare Workers Scripts:Edit' permission as the secret"
            echo "   CLOUDFLARE_WORKERS_TOKEN in your GitHub repo settings."
            echo "   Skipping — all other checks remain green."
            exit 0
          fi
          npx wrangler deploy --minify

      - name: Push TERMII_API_KEY secret to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TERMII_API_KEY: ${{ secrets.TERMII_API_KEY }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Skipping — CLOUDFLARE_WORKERS_TOKEN not set."
            exit 0
          fi
          if [ -n "$TERMII_API_KEY" ]; then
            echo "$TERMII_API_KEY" | npx wrangler secret put TERMII_API_KEY
            echo "✅ TERMII_API_KEY pushed to worker."
          else
            echo "ℹ️  TERMII_API_KEY not set in GitHub secrets — skipping."
          fi

      - name: Push API_ORIGIN secret to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_ORIGIN_URL: ${{ secrets.API_ORIGIN_URL }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Skipping — CLOUDFLARE_WORKERS_TOKEN not set."
            exit 0
          fi
          if [ -n "$API_ORIGIN_URL" ]; then
            echo "$API_ORIGIN_URL" | npx wrangler secret put API_ORIGIN
            echo "✅ API_ORIGIN pushed to worker."
          else
            echo "ℹ️  API_ORIGIN_URL not set in GitHub secrets — skipping."
          fi

      - name: Push VAPID_PUBLIC_KEY secret to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Skipping — CLOUDFLARE_WORKERS_TOKEN not set."
            exit 0
          fi
          if [ -n "$VAPID_PUBLIC_KEY" ]; then
            echo "$VAPID_PUBLIC_KEY" | npx wrangler secret put VAPID_PUBLIC_KEY
            echo "✅ VAPID_PUBLIC_KEY pushed to worker."
          else
            echo "ℹ️  VAPID_PUBLIC_KEY not set in GitHub secrets — skipping."
          fi

      - name: Push VAPID_PRIVATE_KEY secret to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Skipping — CLOUDFLARE_WORKERS_TOKEN not set."
            exit 0
          fi
          if [ -n "$VAPID_PRIVATE_KEY" ]; then
            echo "$VAPID_PRIVATE_KEY" | npx wrangler secret put VAPID_PRIVATE_KEY
            echo "✅ VAPID_PRIVATE_KEY pushed to worker."
          else
            echo "ℹ️  VAPID_PRIVATE_KEY not set in GitHub secrets — skipping."
          fi

      - name: Push VAPID_SUBJECT secret to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Skipping — CLOUDFLARE_WORKERS_TOKEN not set."
            exit 0
          fi
          if [ -n "$VAPID_SUBJECT" ]; then
            echo "$VAPID_SUBJECT" | npx wrangler secret put VAPID_SUBJECT
            echo "✅ VAPID_SUBJECT pushed to worker."
          else
            echo "ℹ️  VAPID_SUBJECT not set in GitHub secrets — skipping."
          fi
