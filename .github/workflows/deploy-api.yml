name: Deploy — Cloudflare Worker (API Gateway)

on:
  push:
    branches: [main]
    paths:
      - 'workers/loop-messenger-api/**'
      - 'artifacts/api-server/**'
      - 'lib/db/**'
      - 'lib/api-spec/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install worker dependencies
        working-directory: workers/loop-messenger-api
        run: npm install

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/loop-messenger-api
          command: deploy --minify

      - name: Set TERMII_API_KEY secret
        if: ${{ secrets.TERMII_API_KEY != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/loop-messenger-api
          command: secret put TERMII_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TERMII_API_KEY: ${{ secrets.TERMII_API_KEY }}

      - name: Set API_ORIGIN secret
        if: ${{ secrets.API_ORIGIN_URL != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/loop-messenger-api
          command: secret put API_ORIGIN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          API_ORIGIN: ${{ secrets.API_ORIGIN_URL }}
