name: Deploy Messenger API Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install worker dependencies
        working-directory: workers/loop-messenger-api
        run: npm install

      - name: Deploy worker to Cloudflare
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --minify

      - name: Push SUPABASE_SERVICE_ROLE_KEY to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "FATAL: SUPABASE_SERVICE_ROLE_KEY is not set in GitHub secrets" && exit 1
          fi
          echo "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
          echo "SUPABASE_SERVICE_ROLE_KEY pushed to worker"

      - name: Push RALD_JWT_SECRET to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RALD_JWT_SECRET: ${{ secrets.RALD_JWT_SECRET }}
        run: |
          if [ -z "$RALD_JWT_SECRET" ]; then
            echo "WARNING: RALD_JWT_SECRET is not set — add it to messenger GitHub secrets for auth to work"
          else
            echo "$RALD_JWT_SECRET" | npx wrangler secret put RALD_JWT_SECRET
            echo "RALD_JWT_SECRET pushed to worker"
          fi

      - name: Push TERMII_API_KEY to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TERMII_API_KEY: ${{ secrets.TERMII_API_KEY }}
        run: |
          if [ -n "$TERMII_API_KEY" ]; then
            echo "$TERMII_API_KEY" | npx wrangler secret put TERMII_API_KEY
            echo "TERMII_API_KEY pushed"
          fi

      - name: Push API_ORIGIN to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_ORIGIN_URL: ${{ secrets.API_ORIGIN_URL }}
        run: |
          if [ -n "$API_ORIGIN_URL" ]; then
            echo "$API_ORIGIN_URL" | npx wrangler secret put API_ORIGIN
            echo "API_ORIGIN pushed"
          fi

      - name: Push VAPID secrets to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          if [ -n "$VAPID_PUBLIC_KEY" ]; then
            echo "$VAPID_PUBLIC_KEY" | npx wrangler secret put VAPID_PUBLIC_KEY
            echo "$VAPID_PRIVATE_KEY" | npx wrangler secret put VAPID_PRIVATE_KEY
            echo "$VAPID_SUBJECT" | npx wrangler secret put VAPID_SUBJECT
            echo "VAPID secrets pushed"
          fi
