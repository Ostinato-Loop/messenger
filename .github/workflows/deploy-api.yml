name: Deploy - Cloudflare Worker API Gateway

on:
  push:
    branches: [main]
    paths:
      - 'workers/loop-messenger-api/**'
      - 'artifacts/api-server/**'
      - 'lib/db/**'
      - 'lib/api-spec/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install worker dependencies
        working-directory: workers/loop-messenger-api
        run: npm install

      - name: Deploy worker to Cloudflare
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --minify

      - name: Push TERMII_API_KEY secret to worker
        if: ${{ vars.TERMII_API_KEY != '' || true }}
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TERMII_API_KEY: ${{ secrets.TERMII_API_KEY }}
        run: |
          if [ -n "$TERMII_API_KEY" ]; then
            echo "$TERMII_API_KEY" | npx wrangler secret put TERMII_API_KEY
          else
            echo "TERMII_API_KEY not set — skipping"
          fi

      - name: Push API_ORIGIN secret to worker
        working-directory: workers/loop-messenger-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_ORIGIN_URL: ${{ secrets.API_ORIGIN_URL }}
        run: |
          if [ -n "$API_ORIGIN_URL" ]; then
            echo "$API_ORIGIN_URL" | npx wrangler secret put API_ORIGIN
          else
            echo "API_ORIGIN_URL not set — skipping"
          fi
