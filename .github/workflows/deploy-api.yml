name: Deploy — API Server

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/db/**'
      - 'lib/api-spec/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run codegen
        run: pnpm --filter @workspace/api-spec run codegen

      - name: Build API
        run: pnpm --filter @workspace/api-server run build

      # ── Option A: Deploy to Cloudflare Workers (adapt wrangler.toml as needed) ──
      # - name: Deploy to Cloudflare Workers
      #   uses: cloudflare/wrangler-action@v3
      #   with:
      #     apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      #     accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      #     workingDirectory: artifacts/api-server

      # ── Option B: Deploy to any Node.js host (Railway, Fly.io, etc.) ──
      - name: Echo deployment ready
        run: |
          echo "API build complete. Configure your deployment target above."
          echo "Build output: artifacts/api-server/dist/"
          ls -lh artifacts/api-server/dist/
