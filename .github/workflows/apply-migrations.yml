name: Apply Supabase Migrations

# Triggered automatically when migration files change, or manually.
# Requires SUPABASE_DB_PASSWORD to be configured in the messenger GitHub repo secrets.
# If missing, migration steps are skipped and CI stays green.
# Migration directory: workers/loop-messenger-api/supabase/migrations/*.sql

on:
  push:
    branches: [main]
    paths:
      - 'workers/loop-messenger-api/supabase/migrations/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (show SQL without applying)"
        required: false
        default: "false"

concurrency:
  group: supabase-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply DB Migrations to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify migration files exist
        run: |
          MIGRATION_DIR="workers/loop-messenger-api/supabase/migrations"
          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "ERROR: migration directory not found: $MIGRATION_DIR"
            exit 1
          fi
          echo "Migration files:"
          ls -la "$MIGRATION_DIR/"

      - name: Check required secrets
        id: secrets-check
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "WARNING: SUPABASE_DB_PASSWORD not configured - skipping all migration steps."
            echo "Add SUPABASE_DB_PASSWORD to messenger repo secrets to enable auto-migrations."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "SUPABASE_DB_PASSWORD present - proceeding with migration."
          fi

      - name: Install psql
        if: steps.secrets-check.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply migrations via Supabase session pooler
        if: steps.secrets-check.outputs.skip != 'true'
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DRY_RUN:    ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          MIGRATION_DIR="workers/loop-messenger-api/supabase/migrations"
          # Session pooler: IPv4, reachable from GitHub Actions runners
          # db.xxx.supabase.co is IPv6-only and unreachable from GitHub Actions
          SUPABASE_HOST="aws-0-eu-west-1.pooler.supabase.com"
          SUPABASE_USER="postgres.onxdcikfttdmnhofsuwo"
          SUPABASE_DB="postgres"
          SUPABASE_PORT="5432"

          echo "Host:    $SUPABASE_HOST"
          echo "User:    $SUPABASE_USER"
          echo "Dry run: $DRY_RUN"

          FAILED=0
          for f in $(ls "$MIGRATION_DIR"/*.sql 2>/dev/null | sort); do
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Migration: $f"
            if [ "$DRY_RUN" = "true" ]; then
              cat "$f"
            else
              if psql \
                -h "$SUPABASE_HOST" \
                -U "$SUPABASE_USER" \
                -d "$SUPABASE_DB" \
                -p "$SUPABASE_PORT" \
                --set ON_ERROR_STOP=on \
                -f "$f"; then
                echo "OK Applied: $f"
              else
                echo "FAIL: $f"
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "ERROR: $FAILED migration(s) failed."
            exit 1
          fi
          echo "All migrations applied successfully."

      - name: Smoke test - verify tables exist
        if: steps.secrets-check.outputs.skip != 'true' && github.event.inputs.dry_run != 'true'
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          RESULT=$(psql \
            -h "aws-0-eu-west-1.pooler.supabase.com" \
            -U "postgres.onxdcikfttdmnhofsuwo" \
            -d "postgres" -p 5432 -t -A \
            -c "SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename IN ('messenger_conversations','messenger_messages','messenger_conversation_members','profiles') ORDER BY tablename;")
          echo "Tables found: $RESULT"
          for t in messenger_conversation_members messenger_conversations messenger_messages profiles; do
            if echo "$RESULT" | grep -q "$t"; then
              echo "OK $t"
            else
              echo "MISSING: $t"
              exit 1
            fi
          done
          echo "Smoke test passed."

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.secrets-check.outputs.skip }}" = "true" ]; then
            echo "SKIPPED: SUPABASE_DB_PASSWORD not configured."
          else
            echo "Done. Check step logs above for results."
          fi
