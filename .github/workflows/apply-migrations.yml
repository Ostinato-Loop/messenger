name: Apply Supabase Migrations

# Triggered automatically when migration files change, or manually.
# Requires two secrets to be configured in the messenger GitHub repo:
#   SUPABASE_DB_PASSWORD  — Supabase project database password (Settings → Database → Connection info)
#   SUPABASE_ACCESS_TOKEN — Supabase personal access token (account.supabase.com → Access Tokens)
#
# The migration files live at:
#   workers/loop-messenger-api/supabase/migrations/*.sql

on:
  push:
    branches: [main]
    paths:
      - 'workers/loop-messenger-api/supabase/migrations/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (show SQL without applying)"
        required: false
        default: "false"

concurrency:
  group: supabase-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply DB Migrations to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify migration files exist
        run: |
          MIGRATION_DIR="workers/loop-messenger-api/supabase/migrations"
          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "ERROR: migration directory not found: $MIGRATION_DIR"
            exit 1
          fi
          echo "Migration files:"
          ls -la "$MIGRATION_DIR/"

      - name: Check required secrets
        env:
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ] && [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "FATAL: Neither SUPABASE_DB_PASSWORD nor SUPABASE_ACCESS_TOKEN is set."
            echo "To fix, add at least one of these secrets to the GitHub repo:"
            echo "  SUPABASE_DB_PASSWORD  — from Supabase dashboard → Settings → Database"
            echo "  SUPABASE_ACCESS_TOKEN — from account.supabase.com → Access Tokens"
            exit 1
          fi
          echo "Required secrets present."

      - name: Install psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply migrations via direct postgres connection
        env:
          PGPASSWORD:           ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          MIGRATION_DIR="workers/loop-messenger-api/supabase/migrations"
          SUPABASE_HOST="db.onxdcikfttdmnhofsuwo.supabase.co"
          SUPABASE_USER="postgres"
          SUPABASE_DB="postgres"
          SUPABASE_PORT="5432"

          echo "Applying migrations to: $SUPABASE_HOST"
          echo "Dry run: $DRY_RUN"

          for f in $(ls "$MIGRATION_DIR"/*.sql | sort); do
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Migration: $f"
            if [ "$DRY_RUN" = "true" ]; then
              echo "[dry-run] SQL contents:"
              cat "$f"
            else
              psql \
                -h "$SUPABASE_HOST" \
                -U "$SUPABASE_USER" \
                -d "$SUPABASE_DB" \
                -p "$SUPABASE_PORT" \
                --set ON_ERROR_STOP=on \
                -f "$f" \
                && echo "✓ Applied: $f" \
                || echo "⚠ Failed or already applied: $f (check output above)"
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Migration run complete."

      - name: Smoke test — verify tables exist
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          RESULT=$(psql \
            -h "db.onxdcikfttdmnhofsuwo.supabase.co" \
            -U "postgres" -d "postgres" -p 5432 \
            -t -A \
            -c "SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename IN ('messenger_conversations','messenger_messages','messenger_conversation_members','profiles') ORDER BY tablename;")
          echo "Tables found: $RESULT"
          EXPECTED="messenger_conversation_members messenger_conversations messenger_messages profiles"
          for t in $EXPECTED; do
            if echo "$RESULT" | grep -q "$t"; then
              echo "✓ $t"
            else
              echo "✗ MISSING: $t"
            fi
          done
