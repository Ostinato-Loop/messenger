name: Sync Worker Secrets

# One-shot: run manually to push messenger-held secrets to rald-realtime and rald-notify
# Also registers notification.rald.cloud DNS record in the rald.cloud Cloudflare zone.
on:
  workflow_dispatch:

jobs:
  sync:
    name: Push secrets to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - name: Install wrangler
        run: npm install -g wrangler@4.16.0

      - name: Push TENCENT_SDK_APP_ID to rald-realtime
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TENCENT_SDKAPPID: ${{ secrets.TENCENT_SDKAPPID }}
        run: |
          if [ -z "$TENCENT_SDKAPPID" ]; then echo "WARN: TENCENT_SDKAPPID not set"; else
            echo "$TENCENT_SDKAPPID" | wrangler secret put TENCENT_SDK_APP_ID --name rald-realtime
            echo "TENCENT_SDK_APP_ID pushed to rald-realtime"; fi

      - name: Push TENCENT_SECRET_KEY to rald-realtime
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TENCENT_SECRETKEY: ${{ secrets.TENCENT_SECRETKEY }}
        run: |
          if [ -z "$TENCENT_SECRETKEY" ]; then echo "WARN: TENCENT_SECRETKEY not set"; else
            echo "$TENCENT_SECRETKEY" | wrangler secret put TENCENT_SECRET_KEY --name rald-realtime
            echo "TENCENT_SECRET_KEY pushed to rald-realtime"; fi

      - name: Push RALD_JWT_SECRET to rald-realtime + rald-notify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RALD_JWT_SECRET: ${{ secrets.RALD_JWT_SECRET }}
        run: |
          if [ -z "$RALD_JWT_SECRET" ]; then echo "WARN: skip"; exit 0; fi
          echo "$RALD_JWT_SECRET" | wrangler secret put RALD_JWT_SECRET --name rald-realtime
          echo "$RALD_JWT_SECRET" | wrangler secret put RALD_JWT_SECRET --name rald-notify
          echo "RALD_JWT_SECRET pushed to both workers"

      - name: Push SUPABASE_SERVICE_ROLE_KEY to rald-realtime
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then echo "WARN: skip"; exit 0; fi
          echo "$SUPABASE_SERVICE_ROLE_KEY" | wrangler secret put SUPABASE_SERVICE_ROLE_KEY --name rald-realtime
          echo "pushed SUPABASE_SERVICE_ROLE_KEY to rald-realtime"

      - name: Push SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY to rald-notify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "$SUPABASE_URL" | wrangler secret put SUPABASE_URL --name rald-notify
          echo "$SUPABASE_SERVICE_ROLE_KEY" | wrangler secret put SUPABASE_SERVICE_ROLE_KEY --name rald-notify
          echo "Supabase secrets pushed to rald-notify"

      - name: Push RESEND_API_KEY to rald-notify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -n "$RESEND_API_KEY" ]; then
            echo "$RESEND_API_KEY" | wrangler secret put RESEND_API_KEY --name rald-notify
            echo "RESEND_API_KEY pushed"; fi

      - name: Push TERMII_* to rald-notify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TERMII_API_KEY: ${{ secrets.TERMII_API_KEY }}
          TERMII_SENDER_ID: ${{ secrets.TERMII_SENDER_ID }}
        run: |
          if [ -n "$TERMII_API_KEY" ]; then
            echo "$TERMII_API_KEY" | wrangler secret put TERMII_API_KEY --name rald-notify
            echo "$TERMII_SENDER_ID" | wrangler secret put TERMII_SENDER_ID --name rald-notify
            echo "TERMII pushed to rald-notify"; fi

      - name: Push VAPID keys to rald-notify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          if [ -n "$VAPID_PUBLIC_KEY" ]; then
            echo "$VAPID_PUBLIC_KEY"  | wrangler secret put VAPID_PUBLIC_KEY  --name rald-notify
            echo "$VAPID_PRIVATE_KEY" | wrangler secret put VAPID_PRIVATE_KEY --name rald-notify
            echo "$VAPID_SUBJECT"     | wrangler secret put VAPID_SUBJECT     --name rald-notify
            echo "VAPID pushed"; fi

      - name: Register notification.rald.cloud DNS (Cloudflare proxied AAAA 100::)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node << 'JSEOF'
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const h = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
          async function api(method, path, body) {
            const r = await fetch(`https://api.cloudflare.com/client/v4${path}`, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
            return r.json();
          }
          (async () => {
            const zones = await api('GET', '/zones?name=rald.cloud');
            const zone = zones.result?.[0];
            if (!zone) { console.error('rald.cloud zone not found'); process.exit(1); }
            console.log(`Zone ${zone.id}`);
            const existing = await api('GET', `/zones/${zone.id}/dns_records?name=notification.rald.cloud`);
            if (existing.result?.length > 0) {
              console.log('notification.rald.cloud DNS already exists:', existing.result.map(r => `${r.type} ${r.content}`).join(', '));
            } else {
              const r = await api('POST', `/zones/${zone.id}/dns_records`, {
                type: 'AAAA', name: 'notification', content: '100::', proxied: true,
                comment: 'Cloudflare Worker route — rald-notify'
              });
              console.log(r.success ? 'Created notification.rald.cloud → 100:: (proxied)' : 'FAILED: ' + JSON.stringify(r.errors));
            }
          })().catch(e => { console.error(e); process.exit(1); });
          JSEOF

      - name: Summary
        if: always()
        run: |
          echo "=== Worker Secret Sync Complete ==="
          echo "rald-realtime: TENCENT_SDK_APP_ID, TENCENT_SECRET_KEY, RALD_JWT_SECRET, SUPABASE_SERVICE_ROLE_KEY"
          echo "rald-notify:   RALD_JWT_SECRET, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, RESEND_API_KEY, TERMII_*, VAPID_*"
          echo "DNS:           notification.rald.cloud → Cloudflare Workers (rald-notify)"
