name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_RALD_API_URL: ${{ secrets.VITE_RALD_API_URL }}

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            TERMII_API_KEY
            SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_URL
            SUPABASE_PUBLISHABLE_KEY
            TERMII_SENDER_ID
            TERMII_BASE_URL
            TERMII_CHANNEL
        env:
          TERMII_API_KEY: ${{ secrets.TERMII_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          TERMII_SENDER_ID: ${{ secrets.TERMII_SENDER_ID }}
          TERMII_BASE_URL: ${{ secrets.TERMII_BASE_URL }}
          TERMII_CHANNEL: ${{ secrets.TERMII_CHANNEL }}
