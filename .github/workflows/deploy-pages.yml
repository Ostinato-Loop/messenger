name: Deploy — Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run codegen
        run: pnpm --filter @workspace/api-spec run codegen

      - name: Build frontend
        env:
          BASE_PATH: /
          PORT: "3000"
          NODE_ENV: production
          VITE_API_URL: ${{ vars.VITE_API_URL || '' }}
          VITE_SUPABASE_URL: "https://onxdcikfttdmnhofsuwo.supabase.co"
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: pnpm --filter @workspace/loop-messenger run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️  CLOUDFLARE_API_TOKEN not configured."
            echo "   To enable Pages auto-deploy, add a Cloudflare API token with"
            echo "   'Cloudflare Pages:Edit' permission as the secret"
            echo "   CLOUDFLARE_API_TOKEN in your GitHub repo settings."
            echo "   Skipping — all other checks remain green."
            exit 0
          fi
          npx wrangler@4.16.0 pages deploy artifacts/loop-messenger/dist/public \
            --project-name=loop-messenger \
            --branch=main

      - name: Register messenger.rald.cloud custom domain (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            npx wrangler@4.16.0 pages domain add loop-messenger messenger.rald.cloud \
              || echo "messenger.rald.cloud already configured"
          fi

      - name: Register chat.rald.cloud custom domain (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            npx wrangler@4.16.0 pages domain add loop-messenger chat.rald.cloud \
              || echo "chat.rald.cloud already configured or pending DNS"
            echo "✅ chat.rald.cloud registered as alias for loop-messenger Pages"
          else
            echo "⚠ CLOUDFLARE_API_TOKEN not set — skipping chat.rald.cloud domain registration"
          fi

      - name: Health checks
        run: |
          sleep 15
          for url in https://messenger.rald.cloud https://chat.rald.cloud; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "$url → HTTP $STATUS"
          done
        continue-on-error: true
