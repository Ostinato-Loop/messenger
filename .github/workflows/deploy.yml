name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  # ── 1. Type-check ──────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run tsc --noEmit
        continue-on-error: true
      - name: Lint
        run: bun run lint
        continue-on-error: true

  # ── 2. Build + Deploy to Cloudflare Pages ─────────────────────────────
  deploy:
    name: Build + Deploy to Pages
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Prepare Pages bundle
        run: |
          # Vite splits the server build into dist/server/index.js + dist/server/assets/*.js
          # Pages needs _worker.js and all its imports present in dist/client/
          cp dist/server/index.js dist/client/_worker.js
          cp -r dist/server/assets/. dist/client/assets/
          echo "Pages bundle ready:"
          echo "  _worker.js: $(wc -c < dist/client/_worker.js) bytes"
          echo "  assets:     $(ls dist/client/assets/ | wc -l) files"

      - name: Set Pages compatibility flags via CF API
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/messenger" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"deployment_configs":{"production":{"compatibility_flags":["nodejs_compat"],"compatibility_date":"2025-09-24"},"preview":{"compatibility_flags":["nodejs_compat"],"compatibility_date":"2025-09-24"}}}' \
            | grep -o '"success":[^,}]*' || true

      - name: Deploy to Cloudflare Pages
        run: |
          bunx wrangler pages deploy dist/client \
            --project-name=messenger \
            --branch=main \
            --commit-dirty=true

      - name: Push runtime secrets to Pages
        run: |
          echo "${{ secrets.TERMII_API_KEY }}"                | bunx wrangler pages secret put TERMII_API_KEY            --project-name=messenger
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"     | bunx wrangler pages secret put SUPABASE_SERVICE_ROLE_KEY --project-name=messenger
          echo "${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" | bunx wrangler pages secret put SUPABASE_PUBLISHABLE_KEY  --project-name=messenger

  # ── 3. PR build check (no deploy) ─────────────────────────────────────
  pr-build-check:
    name: PR Build Check
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'pull_request'
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
