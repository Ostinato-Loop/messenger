name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. Type-check & lint (non-blocking)
  # ─────────────────────────────────────────────
  typecheck:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run tsc --noEmit
        continue-on-error: true
      - run: bun run lint
        continue-on-error: true

  # ─────────────────────────────────────────────
  # 2. Build + Deploy Worker (SSR)
  #    Build and wrangler deploy in same job so
  #    @cloudflare/vite-plugin virtual modules
  #    resolve correctly.
  # ─────────────────────────────────────────────
  deploy-worker:
    name: Build + Deploy Worker
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22 (required by Wrangler ≥4)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Vite + Cloudflare plugin)
        run: bun run build

      - name: Deploy Worker
        run: bunx wrangler deploy

      - name: Set TERMII_API_KEY secret on Worker
        run: echo "${{ secrets.TERMII_API_KEY }}" | bunx wrangler secret put TERMII_API_KEY

      - name: Set SUPABASE_URL secret on Worker
        run: echo "${{ secrets.SUPABASE_URL }}" | bunx wrangler secret put SUPABASE_URL

      - name: Set SUPABASE_PUBLISHABLE_KEY secret on Worker
        run: echo "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" | bunx wrangler secret put SUPABASE_PUBLISHABLE_KEY

  # ─────────────────────────────────────────────
  # 3. Build + Deploy Pages (static CDN assets)
  # ─────────────────────────────────────────────
  deploy-pages:
    name: Build + Deploy Pages
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22 (required by Wrangler ≥4)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Vite + Cloudflare plugin)
        run: bun run build

      - name: Create Pages project (idempotent)
        run: |
          bunx wrangler pages project create loop-messenger \
            --production-branch=main 2>&1 || true

      - name: Deploy static assets to Cloudflare Pages
        run: |
          bunx wrangler pages deploy dist/client \
            --project-name=loop-messenger \
            --branch=main \
            --commit-dirty=true

  # ─────────────────────────────────────────────
  # 4. PR build check (no deploy)
  # ─────────────────────────────────────────────
  pr-build-check:
    name: PR Build Check
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'pull_request'
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
