name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ── 1. Type-check & lint ─────────────────────────────────────────────
  typecheck:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run tsc --noEmit
        continue-on-error: true
      - name: Lint
        run: bun run lint
        continue-on-error: true

  # ── 2. Build + Deploy Worker (SSR + API + Cron) ───────────────────────
  deploy-worker:
    name: Build + Deploy Worker
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Deploy Worker
        run: bunx wrangler deploy
      - name: Push runtime secrets to Worker
        run: |
          echo "${{ secrets.TERMII_API_KEY }}"            | bunx wrangler secret put TERMII_API_KEY
          echo "${{ secrets.SUPABASE_URL }}"              | bunx wrangler secret put SUPABASE_URL
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | bunx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
          echo "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"  | bunx wrangler secret put SUPABASE_PUBLISHABLE_KEY
          echo "${{ secrets.TENCENT_SDKAPPID }}"          | bunx wrangler secret put TENCENT_SDKAPPID
          echo "${{ secrets.TENCENT_SECRETKEY }}"         | bunx wrangler secret put TENCENT_SECRETKEY

  # ── 3. Build + Deploy Pages (SSR _worker.js or SPA fallback) ─────────
  #    Pages URL: https://messenger.pages.dev
  deploy-pages:
    name: Build + Deploy Pages
    runs-on: ubuntu-latest
    needs: [typecheck, deploy-worker]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.deploy-worker.result == 'success'
    environment: production
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Bundle Worker for Pages SSR
        run: |
          bunx wrangler deploy --dry-run --outdir .wrangler-build 2>&1 || true
          if [ -f .wrangler-build/index.js ]; then
            cp .wrangler-build/index.js dist/client/_worker.js
            echo 'Worker bundled for Pages SSR'
          else
            echo 'Worker bundle not found - using SPA fallback'
            echo '/* /index.html 200' > dist/client/_redirects
          fi
      - name: Create Pages project (idempotent)
        run: bunx wrangler pages project create messenger --production-branch=main 2>&1 || true
      - name: Deploy to Cloudflare Pages
        run: |
          bunx wrangler pages deploy dist/client \
            --project-name=messenger \
            --branch=main \
            --commit-dirty=true
      - name: Push runtime secrets to Pages project
        run: |
          echo "${{ secrets.TERMII_API_KEY }}"            | bunx wrangler pages secret put TERMII_API_KEY            --project-name=messenger
          echo "${{ secrets.SUPABASE_URL }}"              | bunx wrangler pages secret put SUPABASE_URL              --project-name=messenger
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | bunx wrangler pages secret put SUPABASE_SERVICE_ROLE_KEY --project-name=messenger
          echo "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"  | bunx wrangler pages secret put SUPABASE_PUBLISHABLE_KEY  --project-name=messenger
          echo "${{ secrets.TENCENT_SDKAPPID }}"          | bunx wrangler pages secret put TENCENT_SDKAPPID          --project-name=messenger
          echo "${{ secrets.TENCENT_SECRETKEY }}"         | bunx wrangler pages secret put TENCENT_SECRETKEY         --project-name=messenger

  # ── 4. PR build check (no deploy) ────────────────────────────────────
  pr-build-check:
    name: PR Build Check
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'pull_request'
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
