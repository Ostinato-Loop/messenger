kind = "web"
previewPath = "/"
title = "Loop Messenger"
version = "1.0.0"
id = "artifacts/loop-messenger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25635

[services.development]
run = "pnpm --filter @workspace/loop-messenger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/loop-messenger", "run", "build" ]
publicDir = "artifacts/loop-messenger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25635"
BASE_PATH = "/"
